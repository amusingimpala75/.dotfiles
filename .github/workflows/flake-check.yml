name: Flake Check

'on':
  push:
    branches:
    - master
  workflow_dispatch: { }

jobs:
  check:
    strategy:
      matrix:
        runner: [ ubuntu-latest, macos-latest ]
    runs-on: ${{ matrix.runner }}
    steps:
    - uses: actions/checkout@v6
    - uses: DeterminateSystems/nix-installer-action@v22
      with:
        extra-conf: experimental-features = flakes nix-command pipe-operators

    - name: Check flake
      run: nix -Lv flake check

  discover:
    strategy:
      matrix:
        runner: [ ubuntu-latest, macos-latest ]
    runs-on: ${{ matrix.runner }}
    outputs:
      runner: ${{ matrix.runner }}
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
    - uses: actions/checkout@v6
    - uses: DeterminateSystems/nix-installer-action@v22
      with:
        extra-conf: experimental-features = flakes nix-command pipe-operators
    - id: set
      run: |
        matrix=$(nix eval --json .#packages.$(nix eval --impure --raw --expr 'builtins.currentSystem') | nix run nixpkgs#jq -- -c '{input: keys}')
        echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  builds:
    needs: discover
    strategy:
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    runs-on: ${{ needs.discover.outputs.runner }}

    steps:
    - uses: actions/checkout@v6
    - uses: DeterminateSystems/nix-installer-action@v22
      with:
        extra-conf: experimental-features = flakes nix-command pipe-operators

    - name: Build package
      run: nix build .#${{ matrix.input }}
