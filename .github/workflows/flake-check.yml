name: Flake Check

'on':
  push:
    branches:
    - master
  workflow_dispatch: { }

jobs:
  check:
    strategy:
      matrix:
        runner: [ ubuntu-latest, macos-latest ]
    runs-on: ${{ matrix.runner }}
    steps:
    - uses: actions/checkout@v6
    - uses: DeterminateSystems/nix-installer-action@v22
      with:
        extra-conf: experimental-features = flakes nix-command pipe-operators

    - name: Check flake
      run: nix -Lv flake check

  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
    - uses: actions/checkout@v6
    - uses: DeterminateSystems/nix-installer-action@v22
      with:
        extra-conf: experimental-features = flakes nix-command pipe-operators
    - id: set
      run: |
        matrix-macos=$(nix eval --json .#packages.aarch64-darwin | nix run nixpkgs#jq -- -c 'keys | map_values({key: ., value: "macos-latest"}) | from_entries')
        matrix-linux=$(nix eval --json .#packages.x86_64-linux | nix run nixpkgs#jq -- -c 'keys | map_values({key: ., value: "ubuntu-latest"}) | from_entries')
        matrix=$(echo "$matrix-macos\n$matrix-linux" | nix run nixpkgs#jq -s 'map(to_entries) | flatten | group_by(.key) | map({name: .[0].key, runners: [.[] | .value]})')
        echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  builds:
    needs: discover
    strategy:
      matrix:
      - package: ${{ fromJson(needs.discover.outputs.matrix) }}
      - runner: [ ubuntu-latest, macos-latest ]
    runs-on: ${{ matrix.runner }}

    steps:
    - uses: actions/checkout@v6
    - uses: DeterminateSystems/nix-installer-action@v22
      with:
        extra-conf: experimental-features = flakes nix-command pipe-operators

    - name: Build package
      run: nix build .#${{ matrix.package.name }}
      if: ${{ contains(matrix.package.runners, matrix.runner) }}
