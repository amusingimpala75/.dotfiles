name: Flake Check

'on':
  push:
    branches:
    - master
  workflow_dispatch: { }

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: DeterminateSystems/nix-installer-action@v22
      with:
        extra-conf: experimental-features = flakes nix-command pipe-operators

    - name: Check flake
      run: nix -Lv flake check --build-all
