name: Flake Check

'on':
  push:
    branches:
    - master
  workflow_dispatch: { }

jobs:
  check:
    strategy:
      matrix:
        runner: [ ubuntu-latest, macos-latest ]
    runs-on: ${{ matrix.runner }}
    steps:
    - uses: actions/checkout@v6
    - uses: DeterminateSystems/nix-installer-action@v22
      with:
        extra-conf: experimental-features = flakes nix-command pipe-operators

    - name: Check flake
      run: nix -Lv flake check

  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
    - uses: actions/checkout@v6
    - uses: DeterminateSystems/nix-installer-action@v22
      with:
        extra-conf: experimental-features = flakes nix-command pipe-operators
    - id: set
      run: |
        matrix=$(nix eval --impure --json --no-pretty --expr "import .github/workflows/package-runner-matrix.nix")
        echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  builds:
    needs: discover
    strategy:
      matrix:
        build: ${{ fromJson(needs.discover.outputs.matrix) }}
    runs-on: ${{ matrix.build.runner }}

    steps:
    - uses: actions/checkout@v6
    - uses: DeterminateSystems/nix-installer-action@v22
      with:
        extra-conf: experimental-features = flakes nix-command pipe-operators

    - name: Build package
      run: nix build .#${{ matrix.build.package }}
